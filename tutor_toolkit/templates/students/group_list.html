{% extends "base.html" %}

{% block title %}Groups - Tutor Toolkit{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h1 class="h3 mb-0">Groups</h1>
  <a class="btn btn-primary" href="{% url 'students:group_create' %}">New group</a>
</div>

{% if groups %}
  <div class="card">
    <div class="table-responsive">
      <table class="table table-striped mb-0">
        <thead>
          <tr>
            <th>Group</th>
            <th>Students</th>
            <th class="text-end">Actions</th>
          </tr>
        </thead>
        <tbody>
          {% for group in groups %}
            <tr>
              <td>{{ group.name }}</td>
              <td>
                <span class="text-muted">{{ group.students.count }}</span>
              </td>
              <td class="text-end">
                <a class="btn btn-sm btn-outline-secondary" href="{% url 'students:group_edit' group.pk %}">Edit</a>
              </td>
            </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
{% else %}
  <div class="alert alert-info">No groups yet.</div>
{% endif %}
{% endblock %}
