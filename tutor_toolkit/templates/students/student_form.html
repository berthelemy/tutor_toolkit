{% extends "base.html" %}

{% load i18n %}

{% block title %}{% trans "Student" %} - {% trans "Tutor Toolkit" %}{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-8 col-lg-6">
    <div class="card shadow-sm">
      <div class="card-header">
        <h1 class="h5 mb-0">{% trans "Student" %}</h1>
      </div>
      <div class="card-body">
        {% load django_bootstrap5 %}
        <form method="post" novalidate>
          {% csrf_token %}
          {% bootstrap_form form %}
          <div class="d-flex justify-content-end gap-2">
            <a class="btn btn-outline-secondary" href="{% url 'students:list' %}">{% trans "Cancel" %}</a>
            <button class="btn btn-primary" type="submit">{% trans "Save" %}</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
