{% extends "base.html" %}

{% block title %}Confirm delete - Tutor Toolkit{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-8 col-lg-6">
    <div class="card border-danger shadow-sm">
      <div class="card-header bg-danger text-white">
        <h1 class="h5 mb-0">Confirm delete</h1>
      </div>
      <div class="card-body">
        <p class="mb-3">Are you sure you want to delete this item?</p>
        <div class="border rounded p-2 bg-light mb-3">
          <div class="small">{{ object }}</div>
        </div>
        <form method="post">
          {% csrf_token %}
          <div class="d-flex justify-content-end gap-2">
            <a class="btn btn-outline-secondary" href="{{ cancel_url|default:'/' }}">Cancel</a>
            <button class="btn btn-danger" type="submit">Delete</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
