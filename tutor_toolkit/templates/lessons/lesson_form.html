{% extends "base.html" %}

{% block title %}Lesson - Tutor Toolkit{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-10 col-lg-8">
    <div class="card shadow-sm">
      <div class="card-header">
        <h1 class="h5 mb-0">Lesson</h1>
      </div>
      <div class="card-body">
        {% load django_bootstrap5 %}
        <div class="alert alert-secondary">
          Choose either a <strong>Group</strong> or a <strong>Student</strong> (exactly one).
        </div>
        <form method="post" novalidate>
          {% csrf_token %}
          {% bootstrap_form form %}
          <div class="d-flex justify-content-end gap-2">
            <a class="btn btn-outline-secondary" href="{% url 'lessons:list' %}">Cancel</a>
            <button class="btn btn-primary" type="submit">Save</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
